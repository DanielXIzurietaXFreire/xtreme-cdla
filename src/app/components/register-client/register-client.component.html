<div class="form-card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input 
          type="text" 
          id="nombre" 
          placeholder="Nombre completo del cliente" 
          formControlName="nombre">
      </div>
      <div class="form-group">
        <label for="cedula">Cédula</label>
        <input 
          type="text" 
          id="cedula" 
          maxlength="10"
          inputmode="numeric"
          placeholder="Cédula de identidad" 
          formControlName="cedula">
        <div class="field-error" *ngIf="getFieldError('cedula')">
          {{ getFieldError('cedula') }}
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="celular">Celular</label>
        <input 
          type="tel" 
          id="celular" 
          maxlength="10"
          inputmode="numeric"
          placeholder="Número de celular" 
          formControlName="celular">
        <div class="field-error" *ngIf="getFieldError('celular')">
          {{ getFieldError('celular') }}
        </div>
      </div>
      <div class="form-group">
        <label for="tipo-pago">Tipo de pago</label>
        <select id="tipo-pago" formControlName="tipoPago">
          <option value="diario">Diario</option>
          <option value="mensual">Mensual</option>
          <option value="trimestral">Trimestral</option>
          <option value="semestral">Semestral</option>
          <option value="anual">Anual</option>
        </select>
      </div>
    </div>

    <div class="form-row full">
      <div class="form-group">
        <label for="fecha-pago">Fecha de pago</label>
        <input 
          type="date" 
          id="fecha-pago" 
          formControlName="fechaPago">
      </div>
      <div class="form-group">
        <label for="fecha-vencimiento">Fecha de vencimiento</label>
        <input 
          type="date" 
          id="fecha-vencimiento" 
          [value]="fechaVencimiento" 
          disabled>
      </div>
    </div>

    <div class="form-row full">
      <div class="form-group photo-form-group">
        <div class="photo-label">Foto del cliente</div>
        <app-camera-photo 
          context="register" 
          (fotoCapturada)="onFotoCapturada($event)">
        </app-camera-photo>
        <div *ngIf="fotoUrl" class="photo-url-label">
          URL de foto: <span>{{ fotoUrl }}</span>
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="!isFormValid || isSubmitting">
      <i class="fas fa-user-plus"></i>
      {{ isSubmitting ? 'Registrando...' : 'Registrar cliente' }}
    </button>
  </form>
</div>
