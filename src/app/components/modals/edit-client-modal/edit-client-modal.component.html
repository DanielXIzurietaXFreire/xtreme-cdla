<div class="modal">
  <div class="modal-header">
    <h2>Editar cliente</h2>
    <button class="close-btn" (click)="onClose()">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="modal-body">
    <form [formGroup]="form">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" formControlName="nombre" [disabled]="isSubmitting">
      </div>

      <div class="form-group">
        <label>Cédula</label>
        <input type="text" [value]="cliente.cedula" disabled>
        <small>No se puede cambiar la cédula</small>
      </div>

      <div class="form-group">
        <label>Celular</label>
        <input type="tel" formControlName="celular" [disabled]="isSubmitting">
      </div>

      <div class="form-group">
        <label>Tipo de pago</label>
        <select formControlName="tipoPago" [disabled]="isSubmitting">
          <option value="diario">Diario</option>
          <option value="mensual">Mensual</option>
          <option value="trimestral">Trimestral</option>
          <option value="semestral">Semestral</option>
          <option value="anual">Anual</option>
        </select>
      </div>

      <div class="form-group">
        <label>Fecha de pago</label>
        <input type="date" formControlName="fechaPago" [disabled]="isSubmitting">
      </div>

      <div class="form-group">
        <label>Fecha de vencimiento</label>
        <input type="date" [value]="fechaVencimiento" disabled>
      </div>

      <div class="form-group">
        <label>Foto del cliente</label>
        <app-camera-photo 
          context="edit" 
          (fotoCapturada)="onFotoCapturada($event)">
        </app-camera-photo>
        <div *ngIf="fotoUrl" class="photo-url-label">
          URL de foto: <span>{{ fotoUrl }}</span>
        </div>
      </div>
    </form>
  </div>

  <div class="modal-footer">
    <button class="btn btn-secondary" (click)="onClose()" [disabled]="isSubmitting">
      Cancelar
    </button>
    <button class="btn btn-primary" (click)="onSubmit()" [disabled]="form.invalid || isSubmitting">
      {{ isSubmitting ? 'Guardando...' : 'Guardar cambios' }}
    </button>
  </div>
</div>
